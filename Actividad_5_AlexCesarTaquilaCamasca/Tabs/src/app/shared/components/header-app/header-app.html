<ion-header [translucent]="translucent">
  <ion-toolbar>
      <div class="header-app">
       <ion-back-button  *ngIf="!hideBack" class="custom" mode="md" text="" color="dark" 
        [defaultHref]="defaultHref" icon="arrow-back-outline"></ion-back-button>
        <ion-title class="ion-text-center header-title">{{ title }}</ion-title>
      </div>

    
    <div slot="end" class="right-slot-spacer" aria-hidden="true"></div>
  </ion-toolbar>
</ion-header>
