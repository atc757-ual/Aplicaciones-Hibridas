<app-header-app title="Productos"></app-header-app>

<ion-content>
  <div class="products-banner-message">
    <ion-card>
      <ion-card-content>
        <span class="banner-title">Lo mejor de la tecnología</span>
        <br />
        <span class="banner-detail">Descubre productos exclusivos y ofertas especiales para ti.</span>
      </ion-card-content>
    </ion-card>
  </div>

  <div class="section-card">
    <ion-grid>
      <ion-row>
        <ion-col size="6" *ngFor="let product of visibleProducts">
          <div class="product-card">
            <div class="product-img-wrapper">
              <img [src]="product.image" [alt]="product.name" loading="lazy" />
            </div>
            <div class="product-info">
              <p class="product-name">{{ product.name }}</p>
              <p class="original-price"><s>€ {{ product.originalPrice }}</s></p>
              <div class="price-row">
                <span class="current-price">€ {{ product.price }}</span>
                <span class="discount-badge">{{ product.discount }}% OFF</span>
              </div>
              <p class="free-shipping" *ngIf="product.freeShipping">Envío gratis</p>
            </div>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>
    <div class="contain-button">
      <ion-button fill="clear" size="small" (click)="toggleShowAll()">
        <span >{{ showAll ? 'Ver menos productos' : 'Ver más productos' }}</span>
        <ion-icon name="chevron-down-outline" class="chevron"
          [class.chevron--open]="showAll"></ion-icon>
      </ion-button>
    </div>
  </div>
  <div class="contain-logout">
    <ion-button color="danger" size="medium" (click)="onLogout()">
      Cerrar Sesión
    </ion-button>
  </div>

</ion-content>
